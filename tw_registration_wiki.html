    // Render
    function renderCards(items, query = '') {
      const container = document.getElementById('results');
      if (items.length === 0) {
        container.innerHTML = '<div class="no-results">找不到相關結果，請嘗試其他關鍵字。</div>';
        return;
      }
      container.innerHTML = items.map((item, i) => {
        let content = item.content;
        let title = item.title;
        if (query) {
          const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
          title = title.replace(re, '<span class="highlight">$1</span>');
          content = content.replace(re, '<span class="highlight">$1</span>');
        }
        return `<div class="card" onclick="this.querySelector('.content').classList.toggle('open')">
          <h3>${title}</h3>
          <div>${item.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
          <div class="content">${content}</div>
        </div>`;
      }).join('');
    }

    // Search
    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-cat="all"]').classList.add('active');
      if (!q) { renderCards(knowledgeBase); return; }
      const filtered = knowledgeBase.filter(item =>
        item.title.toLowerCase().includes(q) ||
        item.tags.some(t => t.toLowerCase().includes(q)) ||
        item.content.toLowerCase().includes(q)
      );
      renderCards(filtered, q);
    });

    // Category filter
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.cat;
        document.getElementById('search').value = '';
        if (cat === 'all') { renderCards(knowledgeBase); return; }
        renderCards(knowledgeBase.filter(item => item.category === cat));
      });
    });

    // Initial render
    renderCards(knowledgeBase);
